name: build

on:
  push:
    branches: [main, "port/**"]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
      - name: Build and test
        shell: pwsh
        run: .\gradlew.bat clean check build --no-daemon --console=plain
      - name: Validate metadata, Mixins, secrets, and prohibited files
        shell: pwsh
        run: .\scripts\validate-project.ps1 | Tee-Object -FilePath build\checksums.sha256
      - name: Upload CI artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: harvester-${{ github.sha }}
          path: |
            build/libs/*.jar
            build/checksums.sha256
          if-no-files-found: error
          retention-days: 14
